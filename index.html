<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neurra - Главная</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Звёздное небо -->
    <div class="stars" id="stars"></div>

    <div class="container">
        <!-- Верхняя панель -->
        <header class="header">
            <a href="#" class="login-btn">Личный кабинет <span class="alpha-badge">Alpha</span></a>
        </header>

        <!-- Главный заголовок -->
        <h1 class="main-title">Neurra</h1>

        <!-- Секция "Услуги" -->
        <section class="services-section">
            <h2 class="services-title">Услуги</h2>
            <div class="services-grid">
                <div class="service-card">
                    <h3 class="service-name">ИИ</h3>
                    <p class="service-description">Платные подписки на передовые модели</p>
                    <button class="order-btn">Заказать</button>
                </div>
                <div class="service-card in-development">
                    <h3 class="service-name">Пополнение счёта</h3>
                    <p class="service-description">в разработке</p>
                </div>
            </div>
        </section>

        <!-- Секция "Почему мы?" -->
        <section class="why-section">
            <h2 class="why-title">почему мы?</h2>
            <div class="changing-word-container">
                <span class="changing-word" id="changingWord">Быстро</span>
            </div>
        </section>

        <!-- Контакты -->
        <footer class="contacts">
            <p class="contacts-title">Служба поддержки</p>
            <div class="contacts-info">
                <p>Email: support_neurra@gmail.com</p>
                <p><a href="#">Telegram</a> | <a href="#">GitHub</a></p>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
